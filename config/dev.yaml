# ============================================================================
# RAG 企业级知识库问答系统 — 默认配置
#
# ⚠️  安全约定：密钥/密码/Token 等敏感信息只允许通过 .env 文件配置，
#     禁止写入任何 YAML 文件！.env 文件已加入 .gitignore。
#     支持 Fernet 加密格式：LLM_API_KEY=ENC[base64_ciphertext]
#     加密工具：python -m security.env_encrypt
#
# 配置优先级（高→低）：
#   CLI 覆盖 > 环境变量/.env > {env}.yaml > 代码默认值
#
# 此文件为配置参考模板，系统运行时直接读取 {env}.yaml（如 dev.yaml / prod.yaml），
# 不再合并此文件。使用时请将此文件复制为 {env}.yaml 后修改。
#
# 环境变量命名规则：
#   - 双下划线 __ 表示嵌套层级: RETRIEVAL__TOP_K=10 → retrieval.top_k = 10
#   - 键名不区分大小写
#   - 若被系统白名单误过滤，可加 RAG__ 前缀: RAG__RETRIEVAL__TOP_K=10
#
# 路径约定：
#   - 以 / 或盘符开头的路径视为绝对路径
#   - 其他路径字符串会被 Pydantic 转为相对 Path 对象
#   - 代码默认值使用 PROJECT_ROOT 拼接为绝对路径
#
# 环境特定配置：将此文件复制为 dev.yaml / prod.yaml 等，按需修改
# ============================================================================

# 项目信息
project:
  name: rag-enterprise-qa
  version: "1.0.0"

# 运行环境: dev | beta | prod
env: dev

debug: false

# API 服务
api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"
  workers: 1

# --------------------------------------------------------------------------
# 检索配置
# --------------------------------------------------------------------------
retrieval:
  top_k: 5
  expansion_window: 1            # 上下文扩展窗口（向左右各拉 N 个 chunk）
  rrf_k: 60                      # RRF 融合参数
  max_rerank_candidates: 30      # RRF 后进入精排的候选上限（CPU CrossEncoder 延迟保护）
  mmr_lambda: 0.7                # MMR 多样性控制
  relevance_threshold_sufficient: 0.5   # 结果充分 → 直接生成
  relevance_threshold_need_more: 0.3    # 需要补充检索
  similarity_dedup_threshold: 0.85      # 去重相似度阈值
  max_context_tokens: 6000

# --------------------------------------------------------------------------
# 文档处理（离线 Pipeline）
# --------------------------------------------------------------------------
ingestion:
  parsed_doc_dir: data/parsed_docs   # 解析后 Markdown 输出目录（相对于 PROJECT_ROOT）
  parsers:                           # 文件扩展名 → 解析器名称映射
    pdf: docling                     # 可选: pymupdf4llm | mineru
    docx: docling
    doc: docling
    pptx: docling
    ppt: docling
    html: docling
    md: direct                       # 直接读取，不经过 docling
    markdown: direct
    txt: direct
  mineru:                            # MinerU 解析器专用配置
    device: cpu                      # cpu | cuda | mps
    models_dir: local_models/mineru        # MinerU 模型权重目录（相对于 PROJECT_ROOT）

# --------------------------------------------------------------------------
# 文档分块
# --------------------------------------------------------------------------
chunking:
  chunk_size: 512
  overlap: 64
  strategy: semantic             # semantic | fixed | hierarchical
  semantic_threshold_percentile: 0.9   # SemanticChunker 切分敏感度
  semantic_buffer_size: 1              # 切分点缓冲区句子数

# --------------------------------------------------------------------------
# 会话管理
# --------------------------------------------------------------------------
session:
  ttl_hours: 2
  max_history_rounds: 10
  max_context_tokens: 4000
  db_path: data/sessions.db           # 相对于 PROJECT_ROOT；代码默认值 data/sessions.db
  topic_switch_threshold: 0.5
  cleanup_interval_seconds: 600       # 过期会话清理间隔

# --------------------------------------------------------------------------
# Embedding 模型
# --------------------------------------------------------------------------
embedding:
  model: BAAI/bge-large-zh-v1.5
  device: cpu                    # cpu | cuda
  batch_size: 32
  dimension: 1024

# --------------------------------------------------------------------------
# LLM 路由 — ⚠️ api_key 禁止在 YAML 配置，请通过 .env 中的 LLM_API_KEY 设置
# --------------------------------------------------------------------------
llm:
  default: deepseek-v4-pro
  lightweight: deepseek-v4-flash
  local: null                    # 本地模型路径（可选）
  api_key_env: LLM_API_KEY
  api_base_url: null
  temperatures:
    concept: 0.3
    procedure: 0.0
    compare: 0.2
    lookup: 0.0

# --------------------------------------------------------------------------
# 生成层
# --------------------------------------------------------------------------
generation:
  dedup_threshold: 0.85          # 上下文去重余弦阈值
  max_context_chars: 9000        # 上下文字符预算（近似 6000 tokens）
  max_query_chars: 2000          # query 截断上限（防 DoS）
  fact_check_enabled: true       # 事实核查开关

# --------------------------------------------------------------------------
# 联网搜索兜底
# --------------------------------------------------------------------------
web_search:
  enabled: true
  provider: duckduckgo           # duckduckgo | serpapi
  timeout_seconds: 10

# --------------------------------------------------------------------------
# 模型下载管理 — ⚠️ hf_token 禁止在 YAML 配置，请通过 .env 中的 HUGGINGFACE_TOKEN 设置
# --------------------------------------------------------------------------
model:
  cache_dir: local_models                   # 模型下载目录（相对于 PROJECT_ROOT）
  default_models:
    embedding: BAAI/bge-large-zh-v1.5
    rerank: BAAI/bge-reranker-v2-m3
    llm: Qwen/Qwen2.5-1.5B-Instruct  # 本地轻量 LLM（预留）
  hf_token_env: HUGGINGFACE_TOKEN     # HuggingFace Token 环境变量名
  hf_endpoint: https://hf-mirror.com    # 国内镜像: https://hf-mirror.com；设为 null 使用官方源
  max_retries: 3                      # 网络错误重试次数
  download_source: auto              # huggingface | modelscope | auto

# --------------------------------------------------------------------------
# 向量数据库 — 第一期使用 FAISS，后续可迁移至 Milvus
# --------------------------------------------------------------------------
faiss:
  index_type: IVF_FLAT             # IndexFlatIP | IVF_FLAT | IVFPQ | HNSW
  metric_type: COSINE              # COSINE | L2 | IP
  nlist: 100                       # IVF 聚类中心数
  nprobe: 10                       # 检索时搜索的聚类数
  dimension: 1024                   # 与 embedding.dimension 保持一致
  index_dir: data/faiss_indexes    # 索引持久化目录

# --------------------------------------------------------------------------
# 兜底策略
# --------------------------------------------------------------------------
fallback:
  max_retrieval_rounds: 2
  no_answer_message: "抱歉，当前知识库中未找到相关信息，建议补充相关文档或联系管理员。"

# --------------------------------------------------------------------------
# 别名映射
# --------------------------------------------------------------------------
aliases:
  file_path: config/aliases.yaml      # 相对于 PROJECT_ROOT
  auto_reload: true

# --------------------------------------------------------------------------
# 日志
# --------------------------------------------------------------------------
log:
  log_dir: logs                       # 相对于 PROJECT_ROOT；代码默认值 PROJECT_ROOT/logs
  log_level: INFO
  log_file: rag_service.log
  backup_count: 7
  max_bytes: 10485760            # 10MB
  enable_colors: false
  quiet: false
  replace_main_with_filename: true

# --------------------------------------------------------------------------
# 模型微调 & 蒸馏
# --------------------------------------------------------------------------
finetune:
  output_dir: local_models/finetuned       # LoRA 适配器输出目录（相对 PROJECT_ROOT）
  device: auto                       # auto | cuda | cpu
  data_dir: data/finetune            # 训练数据默认目录

  training:
    epochs: 3
    learning_rate: 2.0e-4
    batch_size: 8
    warmup_ratio: 0.1
    max_seq_length: 512
    gradient_accumulation_steps: 4
    eval_steps: 100
    save_steps: 500
    logging_steps: 50

  lora:
    r: 8
    lora_alpha: 32
    lora_dropout: 0.1
    target_modules: null            # null=各模型类型自动推断

  distillation:
    temperature: 2.0
    alpha: 0.5                      # 硬标签权重（0=纯蒸馏，1=纯SFT）

# --------------------------------------------------------------------------
# ReAct Agent 配置
# --------------------------------------------------------------------------
agent:
  max_iterations: 5
  search_top_k: 3
  max_observation_chars: 3000
  llm_temperature: 0.0
  max_consecutive_duplicates: 2
