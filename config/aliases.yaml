# 术语别名映射 — 支持多别名、多含义上下文消歧
#
# 格式：
#   entries:
#     - aliases: [用户术语1, 用户术语2, ...]   # 多个口语表达 → 同一标准术语
#       target: 标准术语
#       context: [消歧关键词, ...]             # 可选；同一别名有多个条目时用于消歧
#
# 消歧规则：
#   当同一别名出现在多个条目中时（如"系统"→内部系统/考勤系统），
#   用 context 关键词在用户输入的完整查询中匹配，得分高者胜出；
#   无匹配时保留原词（保守策略）。

entries:
  # --- 薪资相关 ---
  - aliases: ["工资条", "工资单"]
    target: "薪资明细"
  - aliases: ["公积金"]
    target: "住房公积金"
  - aliases: ["社保"]
    target: "社会保险"
  - aliases: ["五险一金"]
    target: "社会保险和住房公积金"
  - aliases: ["个税"]
    target: "个人所得税"
  - aliases: ["税后"]
    target: "税后收入"
  - aliases: ["税前"]
    target: "税前收入"
  - aliases: ["年终奖"]
    target: "年终奖金"
  - aliases: ["绩效"]
    target: "绩效奖金"

  # --- 假期相关 ---
  - aliases: ["年假"]
    target: "带薪年休假"
  - aliases: ["调休"]
    target: "补休调休"
  - aliases: ["病假"]
    target: "病假管理"
  - aliases: ["事假"]
    target: "事假申请"
  - aliases: ["婚假"]
    target: "婚假申请"
  - aliases: ["产假"]
    target: "产假管理"

  # --- 报销相关 ---
  - aliases: ["报销"]
    target: "费用报销"
  - aliases: ["差旅"]
    target: "差旅费报销"
  - aliases: ["打车"]
    target: "交通费报销"
  - aliases: ["加班餐补"]
    target: "加班餐费补贴"

  # --- IT 相关 ---
  - aliases: ["vpn"]
    target: "VPN 远程接入"
  - aliases: ["wifi"]
    target: "无线网络"
  - aliases: ["打印机"]
    target: "打印设备"
  - aliases: ["电脑"]
    target: "办公电脑"

  # --- 行政相关 ---
  - aliases: ["入职"]
    target: "新员工入职"
  - aliases: ["离职"]
    target: "员工离职流程"
  - aliases: ["转正"]
    target: "试用期转正"
  - aliases: ["打卡"]
    target: "考勤打卡"
  - aliases: ["门禁"]
    target: "门禁卡管理"

  # --- 多义词（同一别名多个含义，通过 context 消歧） ---
  - aliases: ["系统"]
    target: "内部系统"
    context: ["IT", "登录", "账号", "权限", "vpn", "wifi", "打印机", "电脑", "网络", "密码", "软件"]
  - aliases: ["系统"]
    target: "考勤系统"
    context: ["打卡", "考勤", "请假", "休假", "迟到", "早退", "外勤", "出差"]
